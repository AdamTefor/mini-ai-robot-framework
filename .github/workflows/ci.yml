name: Robot Framework CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Générer le JSON depuis le prompt
        run: |
          python generate_json_from_prompt.py

      - name: Générer automatiquement le test Robot
        run: |
          python generate_robot_test.py

      - name: Exécuter les tests Robot avec Allure
        run: |
          robot --listener "allure_robotframework;allure-results" tests/ generated_tests/

      - name: Installer Allure CLI
        run: |
          echo "Installation de Allure CLI..."
          ALLURE_VERSION=2.29.0
          curl -Lo allure.tgz https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -xzf allure.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Générer le rapport Allure
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Upload du rapport Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload des rapports Robot Framework
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-reports
          path: |
            output.xml
            log.html
            report.html