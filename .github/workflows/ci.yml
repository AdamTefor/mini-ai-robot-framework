name: Robot Framework CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer dépendances
        run: |
          pip install robotframework
          pip install robotframework-seleniumlibrary
          pip install allure-robotframework

      - name: Générer test automatiquement
        run: |
          python generate_robot_test.py

      - name: Exécuter tests avec Allure
        run: |
          robot --listener allure_robotframework tests/ generated_tests/

      # ✅ Installer Allure CLI (version propre)
      - name: Install Allure
        run: |
          sudo apt-add-repository ppa:qameta/allure -y
          sudo apt-get update
          sudo apt-get install allure -y

      # ✅ Générer le rapport
      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      # ✅ Upload rapport
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report