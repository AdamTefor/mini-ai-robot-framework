name: Robot Framework CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Installer Allure CLI
        run: |
          wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.34.1.tgz
          tar -zxvf allure-2.34.1.tgz
          sudo mv allure-2.34.1 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Exécuter les tests Robot avec Allure
        run: |
          robot --listener allure_robotframework;allure-results tests/

      - name: Générer le rapport Allure
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Sauvegarder le rapport Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Sauvegarder les résultats Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Sauvegarder les rapports Robot Framework
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-reports
          path: |
            output.xml
            log.html
            report.html